[package]
name = "orangu"
version = "0.9.0"
edition = "2024"
license = "GPL-3.0-or-later"
description = "A coding environment for OpenAI-compatible servers"
authors = ["Jesper Pedersen <jesperpedersen.db@gmail.com>"]

[[bin]]
name = "orangu"
path = "src/bin/orangu/main.rs"

[dependencies]
anyhow = "1.0.100"
arboard = { version = "3.6.1", default-features = false }
clap = { version = "4.5.39", features = ["derive"] }
crossterm = "0.29.0"
home = "0.5.11"
html2text = "0.13.6"
ignore = "0.4.24"
markdown = "1.0.0"
printpdf = "0.7.0"
reqwest = { version = "0.12.24", default-features = false, features = ["json", "rustls-tls"] }
rustyline = "17.0.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
serde_yaml = "0.9.34"
syntect = "5.3.0"
terminal_size = "0.4.1"
ttf-parser = "0.19.2"
tiktoken-rs = "0.6.0"
tokio = { version = "1.48.0", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
walkdir = "2.5.0"
infer = "0.19.0"
mime_guess = "2.0.5"
strum = "0.28.0"
strum_macros = "0.28.0"

[dev-dependencies]
tempfile = "3.20.0"
