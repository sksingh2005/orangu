<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 690" font-family="'DejaVu Sans', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8a7f70"/>
    </marker>
  </defs>

  <!-- card background -->
  <rect x="8" y="8" width="884" height="674" rx="20" fill="#fdfbf7" stroke="#e7ded0" stroke-width="2"/>

  <!-- title -->
  <text x="450" y="52" text-anchor="middle" font-size="26" font-weight="bold" fill="#2c2620">The orangu stack</text>
  <text x="450" y="76" text-anchor="middle" font-size="14" fill="#8a7f70">three cooperating programs, one pure-Rust project</text>

  <!-- you -->
  <rect x="402" y="98" width="96" height="36" rx="18" fill="#efe8dc" stroke="#d8cdba" stroke-width="1.5"/>
  <text x="450" y="121" text-anchor="middle" font-size="15" font-weight="bold" fill="#4a4238">you</text>

  <!-- arrow you -> orangu -->
  <line x1="450" y1="134" x2="450" y2="168" stroke="#8a7f70" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- orangu (editor) -->
  <rect x="250" y="170" width="400" height="96" rx="14" fill="#fff2e6" stroke="#e8792b" stroke-width="2"/>
  <text x="270" y="202" font-size="21" font-weight="bold" fill="#c15c12" font-family="'DejaVu Sans Mono', monospace">orangu</text>
  <text x="270" y="228" font-size="13.5" fill="#6b6156">The coding environment: terminal UI, local + Git/forge</text>
  <text x="270" y="248" font-size="13.5" fill="#6b6156">tools, code review, knowledge graph, semantic search.</text>

  <!-- arrow orangu -> coordinator -->
  <line x1="450" y1="266" x2="450" y2="316" stroke="#8a7f70" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="466" y="295" font-size="12.5" fill="#8a7f70" font-style="italic">OpenAI-compatible HTTP</text>

  <!-- orangu-coordinator -->
  <rect x="250" y="318" width="400" height="96" rx="14" fill="#eef3fb" stroke="#4a78b5" stroke-width="2"/>
  <text x="270" y="350" font-size="21" font-weight="bold" fill="#3a5f92" font-family="'DejaVu Sans Mono', monospace">orangu-coordinator</text>
  <text x="628" y="343" text-anchor="end" font-size="11.5" fill="#7a90b3" font-style="italic">optional</text>
  <text x="270" y="376" font-size="13.5" fill="#6b6156">On-demand model manager: starts and stops the</text>
  <text x="270" y="396" font-size="13.5" fill="#6b6156">server, swapping the model per role (chat, review …).</text>

  <!-- arrow coordinator -> server -->
  <line x1="450" y1="414" x2="450" y2="464" stroke="#8a7f70" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="466" y="443" font-size="12.5" fill="#8a7f70" font-style="italic">OpenAI-compatible HTTP</text>

  <!-- orangu-server -->
  <rect x="250" y="466" width="400" height="96" rx="14" fill="#edf7ef" stroke="#3b8c4e" stroke-width="2"/>
  <text x="270" y="498" font-size="21" font-weight="bold" fill="#2c7040" font-family="'DejaVu Sans Mono', monospace">orangu-server</text>
  <text x="270" y="524" font-size="13.5" fill="#6b6156">Native pure-Rust GGUF engine: loading, tokenization,</text>
  <text x="270" y="544" font-size="13.5" fill="#6b6156">the transformer forward pass, sampling, scheduling.</text>

  <!-- arrow server -> backends -->
  <line x1="450" y1="562" x2="450" y2="596" stroke="#8a7f70" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- backends row -->
  <g font-size="13.5" font-weight="bold" fill="#5a5248" text-anchor="middle">
    <rect x="196" y="600" width="82" height="34" rx="17" fill="#f3ede2" stroke="#d8cdba" stroke-width="1.5"/>
    <text x="237" y="622">CPU</text>
    <rect x="288" y="600" width="92" height="34" rx="17" fill="#f3ede2" stroke="#d8cdba" stroke-width="1.5"/>
    <text x="334" y="622">Vulkan</text>
    <rect x="390" y="600" width="84" height="34" rx="17" fill="#f3ede2" stroke="#d8cdba" stroke-width="1.5"/>
    <text x="432" y="622">CUDA</text>
    <rect x="484" y="600" width="84" height="34" rx="17" fill="#f3ede2" stroke="#d8cdba" stroke-width="1.5"/>
    <text x="526" y="622">ROCm</text>
    <rect x="578" y="600" width="96" height="34" rx="17" fill="#f3ede2" stroke="#d8cdba" stroke-width="1.5"/>
    <text x="626" y="622">OpenCL</text>
  </g>
  <text x="450" y="660" text-anchor="middle" font-size="12.5" fill="#8a7f70">no llama.cpp · no ggml · no Python · no cloud</text>
</svg>
