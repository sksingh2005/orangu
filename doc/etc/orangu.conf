[orangu]
server = main-server
model = ggml-org/gemma-4-E4B-it-GGUF
timeout = 1800
max_tool_rounds = 10
# review_max_tokens = 512
# code_max_tokens = 0
# compile_workers = 0    # parallel /build jobs, e.g. `make -j <n>`; 0 = unused
# compression = on
# quotes = none
# width = 512
# banner = left
# drop_down = on
# mouse = on              # mouse scroll & double-click; Shift+drag to copy
# workspaces = top    # tab bar placement: top|bottom|left|right
# model_verbosity = normal    # terse|normal|verbose
# review_confidence_threshold = 80
# feedback = off
# auto_rebase = off
# auto_squash = off
# terminal = xterm -e
# platform = github

# Each server must use a unique endpoint.
[main-server]
role = all
provider = llama.cpp
endpoint = http://localhost:8100/v1
model = ggml-org/gemma-4-E4B-it-GGUF
# api_key = sk-...    # required if the server runs with --api-key

[qwen-server]
role = explorer
provider = llama.cpp
endpoint = http://localhost:8200/v1
model = unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF

# A server serving an embedding model enables semantic /search. Tag it
# `role = embeddings`; search auto-enables when this endpoint responds.
# [embed-server]
# role = embeddings
# provider = llama.cpp
# endpoint = http://localhost:8300/v1
# model = ggml-org/embeddinggemma-300M-GGUF
