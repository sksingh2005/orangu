[orangu]
server = ollama-server
model = qwen2.5-coder:3b
timeout = 1800
max_tool_rounds = 10
# review_max_tokens = 512
# code_max_tokens = 0
# compile_workers = 0    # parallel /build jobs, e.g. `make -j <n>`; 0 = unused
# compression = on
# quotes = none
# width = 512
# banner = left
# drop_down = on
# workspaces = top    # tab bar placement: top|bottom|left|right
# model_verbosity = normal    # terse|normal|verbose
# review_confidence_threshold = 80
# feedback = off
# auto_rebase = off
# auto_squash = off
# terminal = xterm -e
# platform = github
# mouse = true    # Enable mouse capture in the terminal.

[ollama-server]
role = all
provider = openai
endpoint = http://localhost:11434/v1
model = qwen2.5-coder:3b

[embed-server]
role = embeddings
provider = openai
endpoint = http://localhost:11434/v1
model = nomic-embed-text
