name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

# Serialize runs for the same tag so a re-push or re-run never races another run
# on the shared GitHub release (which previously caused "release not found").
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: don't fail a re-run if the release already exists.
          if ! gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --verify-tag
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: [create-release, manual]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      # The manual (PDF + HTML), built once by the `manual` job, to bundle into
      # every binary archive alongside the three executables.
      - name: Download manual
        uses: actions/download-artifact@v4
        with:
          name: manual
          path: manual-dist

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BINDIR=target/${{ matrix.target }}/release
          ARCHIVE=orangu-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          # Stage the manual next to the binaries so the archive stays flat
          # (installers expect the executables at the archive root).
          cp manual-dist/orangu-en.pdf manual-dist/orangu-en.html "$BINDIR"/
          # The whole stack: the editor plus the coordinator and inference
          # server, and the manual in both formats.
          tar -czf "$ARCHIVE" -C "$BINDIR" \
            orangu orangu-coordinator orangu-server orangu-en.pdf orangu-en.html
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $bindir = "target\${{ matrix.target }}\release"
          $archive = "orangu-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Copy-Item manual-dist\orangu-en.pdf,manual-dist\orangu-en.html $bindir
          # The whole stack: the editor plus the coordinator and inference
          # server, and the manual in both formats.
          $items = @(
            "$bindir\orangu.exe",
            "$bindir\orangu-coordinator.exe",
            "$bindir\orangu-server.exe",
            "$bindir\orangu-en.pdf",
            "$bindir\orangu-en.html"
          )
          Compress-Archive -Path $items -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "$ARCHIVE" --clobber

  manual:
    name: Build manual
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pandoc and TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-plain-generic \
            texlive-latex-extra \
            lmodern

      - name: Install eisvogel template
        run: |
          # The release tarball nests everything under Eisvogel-<version>/, so
          # strip that component to place eisvogel.latex directly where pandoc's
          # --template eisvogel looks (the templates data directory).
          EISVOGEL_VERSION=3.4.0
          mkdir -p ~/.local/share/pandoc/templates
          curl -fsSLo /tmp/eisvogel.tar.gz \
            "https://github.com/Wandmalfarbe/pandoc-latex-template/releases/download/v${EISVOGEL_VERSION}/Eisvogel.tar.gz"
          tar -xzf /tmp/eisvogel.tar.gz -C ~/.local/share/pandoc/templates --strip-components=1

      - name: Build manual
        run: bash doc/build_manual.sh

      # Share the built manual with the per-target build jobs so each binary
      # archive can bundle it, without re-installing pandoc/TeX Live on every
      # matrix OS.
      - name: Upload manual artifact
        uses: actions/upload-artifact@v4
        with:
          name: manual
          path: |
            target/doc/orangu-en.pdf
            target/doc/orangu-en.html

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            target/doc/orangu-en.pdf \
            target/doc/orangu-en.html \
            --clobber

  source:
    name: Source bundle
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create source bundle
        run: |
          BUNDLE=orangu-${{ github.ref_name }}-source.tar.gz
          git archive --format=tar.gz --prefix=orangu-${{ github.ref_name }}/ HEAD -o "$BUNDLE"
          sha256sum "$BUNDLE" > "${BUNDLE}.sha256"
          echo "BUNDLE=$BUNDLE" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "$BUNDLE" "${BUNDLE}.sha256" --clobber
